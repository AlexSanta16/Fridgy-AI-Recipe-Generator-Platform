<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Fridgy API Tester</title>
    <style>
        body {
          font-family: "Segoe UI", sans-serif;
          background-color: #0f172a;
          color: #e5e7eb;
          margin: 0;
          padding: 20px;
        }
        h1 {
          text-align: center;
          color: #38bdf8;
        }
        .card {
          background-color: #1e293b;
          padding: 20px;
          border-radius: 12px;
          margin-bottom: 20px;
          box-shadow: 0 0 10px rgba(56,189,248,0.3);
        }
        input, textarea, select, button {
          width: 100%;
          margin-top: 6px;
          margin-bottom: 10px;
          padding: 8px;
          border-radius: 6px;
          border: none;
          font-size: 15px;
        }
        textarea {
          min-height: 100px;
          resize: vertical;
        }
        button {
          cursor: pointer;
          background-color: #38bdf8;
          color: #0f172a;
          font-weight: 600;
          transition: background 0.2s;
        }
        button:hover { background-color: #7dd3fc; }
        pre {
          background-color: #0b1220;
          padding: 12px;
          border-radius: 10px;
          overflow-x: auto;
          border: 1px solid #1e40af;
        }
        .ok { color: #22c55e; }
        .err { color: #ef4444; }
    </style>
</head>
<body>
<h1>Fridgy API Tester 🍳</h1>
<div class="card">
    <label>Method:</label>
    <select id="method">
        <option value="GET">GET</option>
        <option value="POST">POST</option>
        <option value="PUT">PUT</option>
        <option value="DELETE">DELETE</option>
    </select>

    <label>Endpoint (ex: <code>/recipes</code> sau <code>/ingredients/1</code>):</label>
    <input type="text" id="endpoint" placeholder="/recipes" value="/recipes">

    <label>Request Body (JSON):</label>
    <textarea id="body" placeholder='{"title":"Omletă","instructions":"Prăjește 5 min"}'></textarea>

    <button id="sendBtn">Trimite Request</button>
</div>

<div class="card">
    <h3>Răspuns:</h3>
    <div id="status"></div>
    <pre id="response">(aștept request...)</pre>
</div>

<script>
    const sendBtn = document.getElementById('sendBtn');
    const methodInput = document.getElementById('method');
    const endpointInput = document.getElementById('endpoint');
    const bodyInput = document.getElementById('body');
    const responseEl = document.getElementById('response');
    const statusEl = document.getElementById('status');

    sendBtn.addEventListener('click', async () => {
      const method = methodInput.value;
      const endpoint = endpointInput.value.trim();
      const url = "http://localhost:8080" + endpoint;

      let options = { method, headers: { "Content-Type": "application/json" } };
      if (method !== "GET" && method !== "DELETE") {
        try {
          options.body = JSON.stringify(JSON.parse(bodyInput.value));
        } catch {
          alert("Body-ul nu este JSON valid!");
          return;
        }
      }

      responseEl.textContent = "Se trimite requestul...";
      statusEl.textContent = "";

      try {
        const res = await fetch(url, options);
        const text = await res.text();
        statusEl.innerHTML = `<strong>Status:</strong> <span class="${res.ok ? 'ok':'err'}">${res.status} ${res.statusText}</span>`;
        try {
          const json = JSON.parse(text);
          responseEl.textContent = JSON.stringify(json, null, 2);
        } catch {
          responseEl.textContent = text;
        }
      } catch (e) {
        responseEl.textContent = e;
        statusEl.innerHTML = `<span class="err">Eroare la conexiune cu backend-ul.</span>`;
      }
    });
</script>
</body>
</html>
