<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Fridgy - Vizualizare Bază de Date</title>
    <style>
        body {
          font-family: "Segoe UI", sans-serif;
          background-color: #0f172a;
          color: #f8fafc;
          margin: 0;
          padding: 0;
        }
        header {
          background-color: #1e293b;
          color: #38bdf8;
          text-align: center;
          padding: 20px;
          font-size: 28px;
          font-weight: bold;
          letter-spacing: 1px;
        }
        main {
          padding: 30px;
          display: flex;
          flex-wrap: wrap;
          justify-content: center;
          gap: 30px;
        }
        section {
          background-color: #1e293b;
          padding: 20px;
          border-radius: 12px;
          box-shadow: 0 0 10px rgba(56,189,248,0.3);
          width: 40%;
          min-width: 400px;
        }
        h2 {
          color: #38bdf8;
          border-bottom: 1px solid #38bdf8;
          padding-bottom: 5px;
          margin-bottom: 10px;
        }
        table {
          width: 100%;
          border-collapse: collapse;
          background-color: #0f172a;
          border-radius: 6px;
          overflow: hidden;
        }
        th, td {
          padding: 10px;
          border-bottom: 1px solid #1e293b;
          text-align: left;
        }
        tr:hover { background-color: #0b1220; }
        th {
          color: #7dd3fc;
          background-color: #0f172a;
        }
        .empty {
          color: #94a3b8;
          font-style: italic;
          text-align: center;
          padding: 15px;
        }
        button {
          background: #38bdf8;
          color: #0f172a;
          border: none;
          border-radius: 8px;
          padding: 8px 14px;
          font-weight: 600;
          cursor: pointer;
          transition: 0.2s;
          display: block;
          margin: 15px auto;
        }
        button:hover { background-color: #7dd3fc; }
    </style>
</head>
<body>
<header>🍳 Fridgy - Vizualizare Bază de Date</header>
<main>
    <section>
        <h2>🥚 Ingrediente</h2>
        <button onclick="loadIngredients()">Reîncarcă Ingrediente</button>
        <table id="ingredientsTable">
            <thead><tr><th>ID</th><th>Nume</th></tr></thead>
            <tbody><tr><td colspan="2" class="empty">Se încarcă...</td></tr></tbody>
        </table>
    </section>

    <section>
        <h2>🍲 Rețete</h2>
        <button onclick="loadRecipes()">Reîncarcă Rețete</button>
        <table id="recipesTable">
            <thead><tr><th>ID</th><th>Titlu</th><th>Instrucțiuni</th><th>Ingrediente</th></tr></thead>
            <tbody><tr><td colspan="4" class="empty">Se încarcă...</td></tr></tbody>
        </table>
    </section>
</main>

<script>
    const API = "http://localhost:8080";

    async function loadIngredients() {
      const table = document.querySelector("#ingredientsTable tbody");
      table.innerHTML = '<tr><td colspan="2" class="empty">Se încarcă...</td></tr>';
      try {
        const res = await fetch(`${API}/ingredients`);
        const data = await res.json();
        if (!data.length) {
          table.innerHTML = '<tr><td colspan="2" class="empty">Niciun ingredient în bază.</td></tr>';
          return;
        }
        table.innerHTML = data.map(i => `
          <tr>
            <td>${i.id}</td>
            <td>${i.name}</td>
          </tr>
        `).join('');
      } catch (err) {
        table.innerHTML = `<tr><td colspan="2" class="empty">Eroare la încărcare.</td></tr>`;
      }
    }

    async function loadRecipes() {
      const table = document.querySelector("#recipesTable tbody");
      table.innerHTML = '<tr><td colspan="4" class="empty">Se încarcă...</td></tr>';
      try {
        const res = await fetch(`${API}/recipes`);
        const data = await res.json();
        if (!data.length) {
          table.innerHTML = '<tr><td colspan="4" class="empty">Nicio rețetă în bază.</td></tr>';
          return;
        }
        table.innerHTML = data.map(r => `
          <tr>
            <td>${r.id}</td>
            <td>${r.title}</td>
            <td>${r.instructions}</td>
            <td>${(r.ingredientList || []).map(i => i.name).join(", ")}</td>
          </tr>
        `).join('');
      } catch (err) {
        table.innerHTML = `<tr><td colspan="4" class="empty">Eroare la încărcare.</td></tr>`;
      }
    }

    // Auto load on page start
    loadIngredients();
    loadRecipes();
</script>
</body>
</html>
